# docker-compose.umami.yml
#
# REFERENCE FILE — copy the services, networks, and volumes from this file
# into your server's existing docker-compose.yml.
#
# Prerequisites on the server:
#   - Traefik running with the 'proxy' external network and Let's Encrypt resolver
#   - A .env file with UMAMI_DB_PASSWORD and UMAMI_APP_SECRET set
#
# Required environment variables (add to your server's .env):
#   UMAMI_DB_PASSWORD=<strong-random-password>
#   UMAMI_APP_SECRET=<random-64-char-string>
#
# IMPORTANT: After first launch, log into https://analytics.marlonkranz.com
# and immediately change the default admin password (default: admin / umami).

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    depends_on:
      umami_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami_db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    labels:
      - traefik.enable=true
      - traefik.http.routers.umami.rule=Host(`analytics.marlonkranz.com`)
      - traefik.http.routers.umami.entrypoints=websecure
      - traefik.http.routers.umami.tls.certresolver=letsencrypt
      - traefik.http.services.umami.loadbalancer.server.port=3000
      - traefik.http.routers.umami.middlewares=hsts@docker
    networks:
      - proxy
      - umami_internal

  umami_db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - umami_internal

networks:
  proxy:
    external: true
  umami_internal:
    driver: bridge

volumes:
  umami_db_data:
